# MuJoCo sim2sim config for G1 kicking VQ task

# Policy checkpoint (required, absolute or relative to project root)
# policy_path: "/home/dx/motionprior/logs/g1_kicking_vq/.../model_XXXX.pt"

# MuJoCo robot + ball XML (kicking physics: friction=0.5, restitution=0.7)
xml_path: "/home/dx/motionprior/deploy_mujoco/xml/g1_29dof_ball_kicking.xml"
policy_path: "/home/dx/motionprior/logs/g1_kicking_vq/2026-04-20_10-16-33_test_kick/model_34500.pt"
# Simulation parameters
simulation_dt: 0.002
control_decimation: 10

# Inference device: "cpu" or "cuda:0"
device: "cpu"

# VQ policy architecture (must match training config)
code_dim: 64
num_code: 2048
lab_lambda: 3.0

# Ball and goal init ranges — must match G1KickingEnv._reset_scene_along_line
ball_fwd_range:  [0.8, 1.8]    # ball forward distance from robot [m]
ball_lat_range:  [0.3, 0.6]    # ball lateral offset magnitude [m] (random ± sign)
goal_dist_range: [6.0, 10.0]   # goal forward distance from robot [m]

# Render every N sim steps. 1 = every step; 2 = 2x faster display.
render_decimation: 2
