# MuJoCo sim2sim config for G1 passing VQ task

# Policy checkpoint (required, absolute or relative to project root)
# policy_path: "/home/dx/motionprior/logs/g1_passing_vq/.../model_XXXX.pt"

# MuJoCo robot + ball XML
xml_path: "/home/dx/motionprior/deploy_mujoco/xml/g1_29dof_ball.xml"
policy_path: "/home/dx/motionprior/logs/g1_passing_vq/2026-04-27_17-01-47_test_pass/model_27500.pt"
# Simulation parameters
simulation_dt: 0.002
control_decimation: 10

# Inference device: "cpu" or "cuda:0"
device: "cpu"

# VQ policy architecture (must match training config)
code_dim: 64
num_code: 2048
lab_lambda: 3.0

# Ball initialisation ranges — must match G1PassingCommandsCfg from training
source_distance_range: [3.0, 6.0]   # ball start distance from robot [m]
source_lateral_range:  [-0.3, 0.3]  # lateral offset from robot forward axis [m]
ball_speed_range:      [5.0, 9.0]   # incoming ball speed [m/s]

# Render every N sim steps. 1 = every step; 2 = 2x faster display.
render_decimation: 2
