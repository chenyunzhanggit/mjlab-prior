# MuJoCo sim2sim config for G1 dribbling VQ task

# Policy checkpoint (required, absolute or relative to project root)
# policy_path: "/home/dx/motionprior/logs/g1_dribbling_vq/.../model_XXXX.pt"

# MuJoCo robot + ball XML (dribbling physics: friction=0.35, restitution=0.8)
xml_path: "/home/dx/motionprior/deploy_mujoco/xml/g1_29dof_ball_dribbling.xml"
policy_path: "/home/dx/motionprior/logs/g1_dribbling_vq/2026-04-25_18-43-09_test_drib/model_32500.pt"

# Simulation parameters
simulation_dt: 0.002
control_decimation: 10

# Inference device: "cpu" or "cuda:0"
device: "cpu"

# VQ policy architecture (must match training config)
code_dim: 64
num_code: 2048
lab_lambda: 3.0

# Ball and goal init ranges — must match G1DribblingEnv._reset_scene_along_line
ball_distance_range: [0.4, 0.7]    # ball forward distance from robot [m]
goal_distance_range: [8.0, 15.0]   # goal forward distance from robot [m]

# Render every N sim steps. 1 = every step; 2 = 2x faster display.
render_decimation: 2
