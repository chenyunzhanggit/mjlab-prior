# MuJoCo sim2sim config for G1 downstream VQ velocity-tracking

# Policy checkpoint (required, absolute or relative to project root)
policy_path: "/home/dx/motionprior/logs/dt_velocity_tracking_vq/2026-04-22_19-41-06_test_vel/model_10500.pt"

# MuJoCo robot XML
xml_path: "/home/dx/motionprior/deploy_mujoco/xml/g1_29dof.xml"

# Simulation parameters
simulation_dt: 0.002
control_decimation: 10

# Inference device: "cpu" or "cuda:0"
device: "cpu"

# Keyboard increment-mode settings
# Each Up/Down press changes vx by step_vx; each Z/X press changes wz by step_wz.
step_vx: 0.1
step_wz: 0.1
max_vx: 2.0
max_wz: 2.0

# Render every N sim steps. 1 = every step (slowest/smoothest); 5 = 5× faster display.
render_decimation: 2
