# MuJoCo sim2sim config for mjlab G1 passing downstream-VQ.
#
# Two ckpt files are required because mjlab saves the frozen
# motion-prior backbone and the trainable downstream actor / critic
# separately (see ``runner_single_vq.py:save`` and
# ``downstream_runner.py:save``).
#
# Paths can be absolute, or relative to *this YAML file's directory*.

# Frozen motion-prior backbone — single-VQ ckpt
# (top-level keys: motion_prior / decoder / quantizer / encoder / ...).
motion_prior_ckpt_path: "/home/dx/mjlab-prior/logs/rsl_rl/g1_motion_prior_single_vq/CHANGE_ME/model_XXXX.pt"

# Trainable downstream actor / critic / std — DownStream VQ runner ckpt.
downstream_ckpt_path:   "/home/dx/mjlab-prior/logs/rsl_rl/g1_football_passing_vq/CHANGE_ME/model_XXXX.pt"

# MuJoCo MJCF (29-DOF G1 + soccer ball as a second freejoint).
xml_path: "../xml/g1_29dof_mjlab_passing.xml"

# Simulation timing.
# step_dt = simulation_dt * control_decimation = 0.002 * 10 = 20 ms (50 Hz control)
simulation_dt:      0.002
control_decimation: 10
render_decimation:  10     # render every N sim steps (>1 = faster display)

# Inference device. "cpu" is fine for a single env.
device: "cpu"

# VQ hyperparams. MUST match the motion-prior training cfg.
code_dim:   64
num_code:   2048
lab_lambda: 3.0
use_lab:    true

# ---- Ball randomisation at episode reset ----
# Values must match the training-time PassingCommandCfg ranges
# (see ``src/mjlab/tasks/football/config/g1/env_cfgs.py:unitree_g1_passing_env_cfg``):
#   source_distance_range=(3.0, 6.0)
#   source_lateral_range=(-0.3, 0.3)
#   ball_speed_range=(5.0, 9.0)
source_distance_range: [3.0, 6.0]
source_lateral_range:  [-0.3, 0.3]
ball_speed_range:      [5.0, 9.0]

# Robot initial yaw range (radians). Defaults to full circle [0, 2π] which
# matches training. Tighten to e.g. [0.0, 0.0] for a fixed front-facing
# spawn while debugging.
robot_yaw_range: [0.0, 6.283185307179586]
